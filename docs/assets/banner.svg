<svg width="1280" height="360" viewBox="0 0 1280 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="auto_reverse — AI-orchestrated reverse engineering">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0b0f17"/>
      <stop offset="0.55" stop-color="#0d1322"/>
      <stop offset="1" stop-color="#10182b"/>
    </linearGradient>
    <linearGradient id="title" x1="120" y1="0" x2="900" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#818cf8"/>
      <stop offset="0.5" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#f472b6"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1280" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6366f1" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#f472b6" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#38bdf8" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.5" fill="#ffffff" fill-opacity="0.04"/>
    </pattern>
  </defs>

  <rect width="1280" height="360" rx="20" fill="url(#bg)"/>
  <rect width="1280" height="360" rx="20" fill="url(#dots)"/>
  <ellipse cx="980" cy="150" rx="420" ry="260" fill="url(#glow)"/>

  <!-- prompt mark -->
  <text x="100" y="150" font-family="ui-monospace, 'SF Mono', 'Cascadia Code', Menlo, monospace" font-size="40" font-weight="700" fill="#38bdf8">&gt;_</text>

  <!-- title -->
  <text x="168" y="156" font-family="ui-monospace, 'SF Mono', 'Cascadia Code', Menlo, monospace" font-size="76" font-weight="800" letter-spacing="-2" fill="url(#title)">AUTO_REVERSE</text>

  <!-- tagline -->
  <text x="172" y="206" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-size="25" fill="#c7d2e4" font-weight="500">AI-orchestrated framework for fully automated reverse engineering &amp; pentesting</text>
  <text x="172" y="240" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-size="18" fill="#7d8aa3">One target in &#8594; a structured, reproducible report out. The AI decides what to run, when, and why.</text>

  <!-- accent line -->
  <rect x="100" y="276" width="1080" height="2" fill="url(#line)"/>

  <!-- pipeline chips -->
  <g font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="14" font-weight="600" text-anchor="middle">
    <g>
      <rect x="100"  y="304" width="118" height="34" rx="17" fill="#11203a" stroke="#1f3b63"/>
      <text x="159"  y="326" fill="#7dd3fc">fingerprint</text>
    </g>
    <text x="228" y="326" fill="#3f5377" text-anchor="middle">&#8594;</text>
    <g>
      <rect x="240"  y="304" width="74" height="34" rx="17" fill="#11203a" stroke="#1f3b63"/>
      <text x="277"  y="326" fill="#7dd3fc">plan</text>
    </g>
    <text x="324" y="326" fill="#3f5377">&#8594;</text>
    <g>
      <rect x="336"  y="304" width="86" height="34" rx="17" fill="#11203a" stroke="#1f3b63"/>
      <text x="379"  y="326" fill="#7dd3fc">static</text>
    </g>
    <text x="432" y="326" fill="#3f5377">&#8594;</text>
    <g>
      <rect x="444"  y="304" width="100" height="34" rx="17" fill="#11203a" stroke="#1f3b63"/>
      <text x="494"  y="326" fill="#7dd3fc">dynamic</text>
    </g>
    <text x="554" y="326" fill="#3f5377">&#8594;</text>
    <g>
      <rect x="566"  y="304" width="92" height="34" rx="17" fill="#11203a" stroke="#1f3b63"/>
      <text x="612"  y="326" fill="#7dd3fc">native</text>
    </g>
    <text x="668" y="326" fill="#3f5377">&#8594;</text>
    <g>
      <rect x="680"  y="304" width="128" height="34" rx="17" fill="#11203a" stroke="#1f3b63"/>
      <text x="744"  y="326" fill="#7dd3fc">synthesize</text>
    </g>
    <text x="818" y="326" fill="#3f5377">&#8594;</text>
    <g>
      <rect x="830"  y="304" width="86" height="34" rx="17" fill="#162a1d" stroke="#2c5238"/>
      <text x="873"  y="326" fill="#86efac">verify</text>
    </g>
    <g>
      <rect x="940" y="304" width="148" height="34" rx="17" fill="#241327" stroke="#5a2c63"/>
      <text x="1014" y="326" fill="#f0abfc">report.md &#10003;</text>
    </g>
  </g>
</svg>
