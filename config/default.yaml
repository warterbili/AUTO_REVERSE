# auto_reverse global configuration. The installer/adapters read from here; users can override in config/local.yaml (gitignored).
# Key rule: never hard-code personal absolute paths — use placeholders or a "logical name on PATH."
#
# PERSONAL TOOL PATHS (for any agent/user reading this): if you keep reversing tools outside PATH
# (e.g. a portable jadx/ghidra/wireshark under your home dir), register them in config/local.yaml
# (gitignored — only your machine) so doctor.py / auto_reverse find them:
#   tool_paths:                  # explicit <tool-id> -> absolute path (use when the dir name != tool, e.g. wireshark/ holds tshark)
#     tshark: C:/Users/you/AppData/wireshark/tshark.exe
#   tool_search_roots:           # roots scanned (root/*, root/AppData/*, each + /bin) for a tool's binary
#     - C:/Users/you/AppData
# _toolspec.resolve() checks these first, so your local installs show up without editing shared code.

paths:
  tools_root_env: AUTO_REVERSE_TOOLS    # environment variable name pointing to the tools install dir (on this machine = auto_reverseTOOL)
  workspace: "./workspace"              # per-target artifact directory (gitignored)
  cases: "./cases"                      # desensitized real-world case records (committed)

device:
  transport: usb                        # usb | tcp
  frida_server_path: /data/local/tmp/frida-server
  # frida-server version must match the host frida; architecture must match the device abi (this machine = arm64-v8a)
  start_frida_cmd: "su -c '{frida_server_path} &'"

capture:
  mitm_port: 8080
  session_dir_env: TEMP                 # cross-platform temp directory (Win=%TEMP%, POSIX=/tmp)
  ssl_bypass: frida                     # frida (dynamic) | apk-mitm (static patch)

native:
  ghidra_version_pin: "12.0.3"          # the GhidraMCP extension version must be aligned
  unidbg_max_sdk: 23                    # for libraries above this SDK, unidbg environment patching may be limited

policy:
  desensitize: true                     # never write real credentials/PII into reports or cases
  stop_on_blocked_rounds: 2             # stop and report after N consecutive rounds with no progress
  require_human_for_device_actions: true
