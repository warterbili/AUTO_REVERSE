     source: https://github.com/Cobalt-Strike/cobaltstrike-mcp-server, install: "git clone https://github.com/Cobalt-Strike/cobaltstrike-mcp-server"}
  - {id: sliver-c2-mcp-schwarztim, name: "Sliver C2 MCP", type: mcp, domain: native, bundled: false, status: active,
