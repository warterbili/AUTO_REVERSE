# Cross-domain MCP server catalog — let the AI drive reversing tools directly. See catalog/SCHEMA.md for the schema.
# bundled:true = this project already ships the config / has the backend installed (see mcp/mcp.template.json).

entries:
  # ── Already integrated (mcp.template.json) ──
  - {id: jadx-ai-mcp, name: JADX AI MCP, type: mcp, domain: android, bundled: true, status: active,
     capability: "Agent-driven JADX: decompile/search/xref/rename (GUI plugin + python server)",
     when_to_use: "When you want the AI to operate jadx live rather than just generate commands",
     source: https://github.com/zinja-coder/jadx-ai-mcp, note: "Requires JADX-GUI open with the APK loaded"}
  - {id: apktool-mcp-server, name: Apktool MCP, type: mcp, domain: android, bundled: true, status: active,
     capability: "Agent-driven apktool: smali repack / resource edit / repackage",
     when_to_use: "When letting the AI run a smali-level 'read → edit → build' loop",
     source: https://github.com/zinja-coder/apktool-mcp-server}
  - {id: frida-mcp, name: Frida MCP, type: mcp, domain: android, bundled: true, status: slowed,
     capability: "Agent-driven Frida: attach/spawn/REPL/script injection (general-purpose, incl. iOS)",
     when_to_use: "When letting the AI drive dynamic instrumentation directly (no GUI needed)",
     source: https://github.com/dnakov/frida-mcp, platform: [android, ios]}
  - {id: ghidra-mcp, name: GhidraMCP, type: mcp, domain: native, bundled: true, status: active,
     capability: "Agent-driven Ghidra: decompile/xref/rename/P-code (249 tools)",
     when_to_use: "When letting the AI analyze .so/PE live (requires Ghidra open with the program loaded)",
     source: https://github.com/bethington/ghidra-mcp}
  - {id: ida-pro-mcp, name: IDA Pro MCP, type: mcp, domain: native, bundled: false, status: active,
     capability: "Agent-driven IDA: decompile/xref/rename/patch (stdio + headless idalib)",
     when_to_use: "When you have an IDA Pro 8.3+ license and want the AI to drive IDA (the most popular RE MCP)",
     source: https://github.com/mrexodia/ida-pro-mcp}

  # ── External, top-tier (connect on demand) ──
  - {id: reva, name: ReVa, type: mcp, domain: native, bundled: false, status: active, alt_to: [ghidra-mcp],
     capability: "Ghidra extension MCP with crypto analysis; fine-grained tools to suppress hallucinations",
     when_to_use: "When you want a Ghidra MCP that is more actively maintained than GhidraMCP + crypto analysis",
     source: https://github.com/cyberkaida/reverse-engineering-assistant}
  - {id: binary-ninja-mcp, name: Binary Ninja MCP, type: mcp, domain: native, bundled: false, status: active,
     capability: "Agent-driven Binary Ninja: functions/decompile/xref/rename/types",
     when_to_use: "When you have Binary Ninja and want the AI to use its clean IL / data flow",
     source: https://github.com/fosdickio/binary_ninja_mcp}
  - {id: radare2-mcp, name: radare2 MCP, type: mcp, domain: native, bundled: false, status: active,
     capability: "Official radare2 MCP (open/analyze/disassemble/decompile/xref)",
     when_to_use: "For a fully open-source MCP route, or pairing r2frida for static-dynamic interplay",
     source: https://github.com/radareorg/radare2-mcp, note: "Beware issue #45 shell-escape; audit before use"}
  - {id: re-mcp, name: re-mcp (IDA+Ghidra), type: mcp, domain: native, bundled: false, status: active,
     capability: "Drives headless IDA + Ghidra through one interface, multiple concurrent databases",
     when_to_use: "For a portable workflow that uses unified tool names to switch between IDA/Ghidra",
     source: https://github.com/jtsylve/re-mcp}
  - {id: revula, name: Revula, type: mcp, domain: native, bundled: false, status: active,
     capability: "General-purpose RE MCP (80+ tools): Ghidra/r2/BN/angr/Triton/Frida/YARA/capa/apktool/jadx",
     when_to_use: "When you want one MCP covering the most backends, especially angr/Triton symbolic execution over MCP (Linux/WSL2)",
     source: https://github.com/president-xd/revula, platform: [linux]}
  - {id: mcp-windbg, name: WinDbg MCP, type: mcp, domain: windows, bundled: false, status: active,
     capability: "Agent-driven WinDbg: load crash dump / !analyze / stack backtrace / kernel post-mortem",
     when_to_use: "When Windows crash-dump / kernel debugging needs AI assistance (the only mature WinDbg MCP)",
     source: https://github.com/svnscha/mcp-windbg, platform: [windows]}
  - {id: x64dbg-mcp, name: x64dbg MCP, type: mcp, domain: windows, bundled: false, status: active,
     capability: "Agent-driven x64dbg (breakpoints/disassembly/memory/scripting)",
     when_to_use: "When Windows dynamic debugging needs AI driving (the AgentSmithers C#/HTTP version is battle-tested; for safe defaults choose SetsunaYukiOvO)",
     source: https://github.com/AgentSmithers/x64DbgMCPServer, platform: [windows]}
  - {id: medusa-mcp, name: Medusa MCP, type: mcp, domain: android, bundled: false, status: active,
     capability: "Medusa's bundled Android Frida MCP (HTTP transport)",
     when_to_use: "When you want to use medusa modules + MCP to let the AI orchestrate dynamic instrumentation",
     source: https://github.com/Ch0pin/medusa}
  - {id: kahlo-mcp, name: kahlo-mcp, type: mcp, domain: android, bundled: false, status: active,
     capability: "Autonomous AI-agent Frida instrumentation (Android, most recently maintained)",
     when_to_use: "When you want the most recently maintained autonomous-instrumentation Android Frida MCP",
     source: https://github.com/FuzzySecurity/kahlo-mcp}
  - {id: wshobson-re, name: wshobson RE plugin, type: agent, domain: native, bundled: false, status: active,
     capability: "RE/malware/firmware: 3 agents + 4 skills (anti-reversing / binary patterns / memory forensics / protocol reversing) orchestrating desktop binary tools",
     when_to_use: "When desktop-binary / malware analysis needs a ready-made agent workflow (includes ethical gating)",
     source: https://github.com/wshobson/agents}

  # ── batch-added from collection shortlist (core, bundled:false) ──
  - {id: ghidra-mcp-lauriewired, name: "GhidraMCP", type: mcp, domain: native, bundled: false, status: active,
     capability: "Flagship Ghidra MCP server: LLM-driven decompilation of functions, symbol/variable renaming, comment annotation, xref queries and listing over a running Ghidra instance.",
     when_to_use: "You have a native binary/.so/.exe open (or to open) in Ghidra and want the agent to decompile functions, rename symbols, and walk xrefs autonomously via MCP; the canonical Ghidra MCP reference impl.",
     source: https://github.com/LaurieWired/GhidraMCP, install: "git clone https://github.com/LaurieWired/GhidraMCP"}
  - {id: binary-ninja-headless-mcp, name: "Binary Ninja Headless MCP", type: mcp, domain: native, bundled: false, status: commercial,
     capability: "Headless (no-GUI) Binary Ninja MCP server exposing ~180 tools: disassembly, HLIL/MLIL IL access, binary patching, type editing and xref traversal for AI agents.",
     when_to_use: "You have a Binary Ninja license and want to drive headless BN from an agent for IL-level analysis/patching/type work on native binaries without the GUI.",
     source: https://github.com/mrphrazer/binary-ninja-headless-mcp, install: "git clone https://github.com/mrphrazer/binary-ninja-headless-mcp"}
  - {id: jadx-mcp-server-zinja, name: "JADX MCP Server (zinja-coder)", type: mcp, domain: android, bundled: false, status: active,
     capability: "Python MCP server plus JADX-AI plugin: APK decompilation, AndroidManifest parsing, class/method inspection and LLM-assisted vulnerability hunting.",
     when_to_use: "You need an agent to decompile an APK with JADX and inspect classes/methods/manifest over MCP, or hunt Android vulns; pair with the JADX-AI plugin.",
     source: https://github.com/zinja-coder/jadx-mcp-server, install: "git clone https://github.com/zinja-coder/jadx-mcp-server"}
  - {id: jadx-mcp-plugin-mhl, name: "Jadx-MCP-Plugin (Mobile Hacking Lab)", type: mcp, domain: android, bundled: false, status: active,
     capability: "JADX MCP plugin exposing the live JADX decompiler instance to MCP clients for real-time Android reverse engineering.",
     when_to_use: "You already run JADX-GUI and want to attach an MCP client to the live decompiler session for interactive Android RE (alternative to zinja-coder's server).",
     source: https://github.com/mobilehackinglab/Jadx-MCP-Plugin, install: "git clone https://github.com/mobilehackinglab/Jadx-MCP-Plugin"}
  - {id: x64dbg-mcp-bromoket, name: "x64dbg MCP", type: mcp, domain: windows, bundled: false, status: active,
     capability: "MCP server for the x64dbg debugger exposing ~152 tools for dynamic Windows debugging: breakpoints, stepping, memory/register read-write, module enumeration driven by an LLM.",
     when_to_use: "You're dynamically debugging a Windows PE in x64dbg and want an agent to set breakpoints, step, and read/write memory and registers over MCP.",
     source: https://github.com/bromoket/x64dbg_mcp, install: "git clone https://github.com/bromoket/x64dbg_mcp"}
  - {id: arkana-malware-mcp, name: "Arkana", type: mcp, domain: native, bundled: false, status: active,
     capability: "All-in-one malware-analysis MCP lab with ~290 tools: decompilation, symbolic execution, debugging, YARA/capa/FLOSS, emulation (Qiling/Speakeasy), .NET deobfuscation and a web dashboard.",
     when_to_use: "You want a single agent-driven lab to triage a malware sample end-to-end (decompile + capa/FLOSS/YARA + emulate via Qiling/Speakeasy + .NET deobf) instead of wiring tools individually.",
     source: https://github.com/JameZUK/Arkana, install: "git clone https://github.com/JameZUK/Arkana"}
  - {id: remnux-mcp-server, name: "REMnux MCP Server", type: mcp, domain: native, bundled: false, status: active,
     capability: "MCP server over the REMnux malware-analysis distro: auto-suggests appropriate tools, fetches their help, and runs full analysis tool-chains for an LLM.",
     when_to_use: "You run the REMnux distro and want an agent to pick and chain its malware-analysis tools automatically on a sample.",
     source: https://github.com/REMnux/remnux-mcp-server, install: "git clone https://github.com/REMnux/remnux-mcp-server"}
  - {id: mcp-for-security-cyproxio, name: "MCP for Security", type: mcp, domain: web, bundled: false, status: active,
     capability: "Collection of MCP servers wrapping Nmap, Masscan, SQLMap, FFUF and more for AI-driven pentest workflows including active network recon and live host/port scanning.",
     when_to_use: "You need an agent to run network/web pentest tooling (Nmap host discovery, Masscan high-rate scans, SQLMap, FFUF) over MCP for authorized recon and scanning.",
     source: https://github.com/cyproxio/mcp-for-security, install: "git clone https://github.com/cyproxio/mcp-for-security"}
  - {id: mcp-security-hub-fuzzinglabs, name: "MCP Security Hub", type: mcp, domain: web, bundled: false, status: active,
     capability: "Collection of ~38 offensive-security MCP servers spanning recon, fuzzing, binary analysis, threat intel, OSINT and network scanning (incl. Nmap).",
     when_to_use: "You want a broad catalog of offensive-security MCP servers to bolt onto an assistant (recon + fuzzing + binary + OSINT) rather than picking one tool.",
     source: https://github.com/FuzzingLabs/mcp-security-hub, install: "git clone https://github.com/FuzzingLabs/mcp-security-hub"}
  - {id: hexstrike-ai, name: "HexStrike AI", type: mcp, domain: web, bundled: false, status: active,
     capability: "AI-driven offensive/exploitation orchestration framework that wires many security tools into agent reasoning, exposed as an MCP-integrated tool server.",
     when_to_use: "You want autonomous agent orchestration of a full offensive tool stack (recon to exploitation) rather than manually invoking individual tools.",
     source: https://github.com/0x4m4/hexstrike-ai, install: "git clone https://github.com/0x4m4/hexstrike-ai"}
  - {id: pentest-ai-0xsteph, name: "pentest-ai (0xSteph)", type: mcp, domain: web, bundled: false, status: active,
     capability: "Offensive-security MCP server with 205 wrapped tools, 17 specialist agents and 60 SPA-aware OWASP Top 10 probes; CLI + MCP with bring-your-own LLM.",
     when_to_use: "You're testing a modern SPA/web app and want SPA-aware OWASP Top 10 probes plus specialist agents driven via CLI or MCP with your own LLM.",
     source: https://github.com/0xsteph/pentest-ai, install: "git clone https://github.com/0xsteph/pentest-ai"}
  - {id: pentest-mcp-dmontgomery, name: "pentest-mcp (DMontgomery40)", type: mcp, domain: native, bundled: false, status: active,
     capability: "Pentest MCP server with STDIO/HTTP/SSE transports wrapping nmap, gobuster/dirbuster, nikto, John the Ripper, hashcat and wordlist building.",
     when_to_use: "You want an agent to run nmap scanning, dir busting (gobuster), nikto and cracking (John/hashcat) over a choice of STDIO/HTTP/SSE MCP transports.",
     source: https://github.com/DMontgomery40/pentest-mcp, install: "git clone https://github.com/DMontgomery40/pentest-mcp"}
  - {id: metasploit-mcp-gh05tcrew, name: "MetasploitMCP", type: mcp, domain: native, bundled: false, status: active,
     capability: "MCP server bridging LLMs to the Metasploit Framework for dynamic exploit selection, payload configuration and session control.",
     when_to_use: "You want an agent to drive Metasploit (pick modules, configure payloads, manage sessions) over MCP for authorized exploitation.",
     source: https://github.com/GH05TCREW/MetasploitMCP, install: "git clone https://github.com/GH05TCREW/MetasploitMCP"}
  - {id: burp-mcp-portswigger, name: "Burp Suite MCP Server (official)", type: mcp, domain: web, bundled: false, status: active,
     capability: "Official Burp Suite extension over MCP (SSE at 127.0.0.1:9876 + stdio proxy JAR): query proxy history, inspect full raw HTTP request/response, and drive programmatic interception.",
     when_to_use: "You have Burp Suite running and want an agent to read captured proxy traffic (full raw HTTP) and programmatically intercept/replay requests for web/API analysis.",
     source: https://github.com/PortSwigger/mcp-server, install: "git clone https://github.com/PortSwigger/mcp-server"}
  - {id: burpmcp-ultra, name: "BurpMCP-Ultra", type: mcp, domain: web, bundled: false, status: commercial,
     capability: "Comprehensive Burp Suite Pro MCP server (137 tools): real-time dashboard, custom scan checks, inline fuzzer, race-condition testing, auth diffing, and 30+ sensitive-data pattern scanning over captured proxy traffic.",
     when_to_use: "You have Burp Suite Professional and want an agent for race-condition tests, auth diffing, inline fuzzing, and secret/PII scanning across captured flows beyond the official Burp MCP.",
     source: https://github.com/Cy-S3c/BurpMCP-Ultra, install: "git clone https://github.com/Cy-S3c/BurpMCP-Ultra"}
  - {id: nuclei-mcp-addcontent, name: "Nuclei MCP", type: mcp, domain: web, bundled: false, status: active,
     capability: "Go MCP server for the Nuclei scanner enabling context-aware, targeted template-based vulnerability scanning driven by an LLM.",
     when_to_use: "You want an agent to run Nuclei template-based vuln scans against a target with context-aware template selection over MCP.",
     source: https://github.com/addcontent/nuclei-mcp, install: "git clone https://github.com/addcontent/nuclei-mcp"}
  - {id: mcp-shodan-burtthecoder, name: "MCP Shodan", type: mcp, domain: web, bundled: false, status: active,
     capability: "MCP server for the Shodan API plus CVEDB: IP recon, DNS lookups, exposed-device search and CVE/CPE vulnerability intelligence.",
     when_to_use: "You need an agent to do passive recon via Shodan (IP/device search, DNS) and pull CVE/CPE intel for a target's attack surface.",
     source: https://github.com/BurtTheCoder/mcp-shodan, install: "git clone https://github.com/BurtTheCoder/mcp-shodan"}
  - {id: osint-mcp-server-badchars, name: "OSINT MCP Server", type: mcp, domain: web, bundled: false, status: active,
     capability: "OSINT MCP server with 37 tools across 12 sources (Shodan, VirusTotal, Censys, SecurityTrails, WHOIS, certificate transparency, BGP, Wayback) for attack-surface mapping.",
