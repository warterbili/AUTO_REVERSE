     source: https://github.com/badchars/osint-mcp-server, install: "git clone https://github.com/badchars/osint-mcp-server"}
  - {id: atomic-red-team-mcp, name: "Atomic Red Team MCP", type: mcp, domain: native, bundled: false, status: active,
     capability: "MCP server exposing Atomic Red Team adversary-emulation tests (mapped to MITRE ATT&CK) to AI assistants.",
     when_to_use: "You want an agent to run Atomic Red Team ATT&CK-mapped adversary-emulation tests for detection validation/purple-teaming.",
     source: https://github.com/cyberbuff/atomic-red-team-mcp, install: "git clone https://github.com/cyberbuff/atomic-red-team-mcp"}
  - {id: cobaltstrike-mcp-server, name: "Cobalt Strike MCP Server", type: mcp, domain: native, bundled: false, status: commercial,
     capability: "Official Cobalt Strike MCP server that auto-exposes its REST API endpoints as MCP tools for LLM-driven C2 interaction.",
