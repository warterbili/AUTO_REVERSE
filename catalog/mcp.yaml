     capability: "Dockerized Kali Linux exposed over MCP (SSE) giving an AI assistant controlled shell access to the full Kali pentest toolset (nmap, sqlmap, metasploit, gobuster, etc.).",
     when_to_use: "You need an AI agent to run arbitrary Kali pentest CLI tools (nmap/sqlmap/gobuster/hydra) inside a sandboxed container during an authorized engagement, rather than wiring each tool individually.",
     source: https://github.com/k3nn3dy-ai/kali-mcp, install: "git clone https://github.com/k3nn3dy-ai/kali-mcp"}
  - {id: burp-mcp-server, name: "Burp Suite MCP Server", type: mcp, domain: web, bundled: false, status: active,
