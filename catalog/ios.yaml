# iOS reverse-engineering catalog (a brand-new domain). See catalog/SCHEMA.md for the schema.
# Minimal-from-scratch toolchain: access (palera1n|TrollStore|SideStore) → decrypt-dump (bagbak) →
#                class-dump/binary (ipsw) → dynamic (Frida+objection) → re-sign + deploy (ldid+theos).

entries:
  - {id: ios-app-re, name: iOS App RE, type: skill, domain: ios, bundled: true, status: active,
     capability: "iOS reversing automation orchestration: access device → decrypt-dump → class-dump/binary → Frida dynamic → re-sign + deploy",
     when_to_use: "The main entry point for reversing any iOS app — it routes to the tools below by iOS version / target",
     source: "skills/ios/ios-app-re", platform: [ios]}

  # ── Decrypt-dump / binary ──
  - {id: bagbak, name: bagbak, type: tool, domain: ios, bundled: false, status: active, alt_to: [frida-ios-dump],
     capability: "Frida-based decrypt-dumping, outputs a clean IPA (iOS 15/16)",
     when_to_use: "The first step of iOS static analysis — dump a decrypted IPA / main binary from a jailbroken device",
     source: https://github.com/ChiChou/bagbak, install: "npm i -g bagbak", platform: [ios]}
  - {id: frida-ios-dump, name: frida-ios-dump, type: script, domain: ios, bundled: false, status: archived,
     capability: "SSH into a jailbroken device to decrypt-dump and repack an IPA (the historical de facto standard)",
     when_to_use: "Reference for older tutorials; on iOS 15+ switch to bagbak",
     source: https://github.com/AloneMonkey/frida-ios-dump, platform: [ios]}
  - {id: ipsw, name: ipsw (blacktop), type: tool, domain: ios, bundled: false, status: active,
     capability: "iOS swiss-army knife: Mach-O parsing / class-dump / dyld_shared_cache extraction / disassembly / IPSW diff",
     when_to_use: "Infrastructure for iOS binary analysis — class-dump, split the DSC to reverse system frameworks, Mach-O analysis (ships with SKILL.md)",
     source: https://github.com/blacktop/ipsw, install: "winget/brew/go install", platform: [ios, windows, mac, linux]}
  - {id: dsdump, name: dsdump, type: tool, domain: ios, bundled: false, status: archived,
     capability: "Modern class-dump (supports Swift + ObjC types)",
     when_to_use: "Dumping ObjC/Swift headers; archived — for new targets use ipsw class-dump",
     source: https://github.com/DerekSelander/dsdump, platform: [ios, mac]}
  - {id: hopper, name: Hopper, type: tool, domain: ios, bundled: false, status: commercial,
     capability: "Commercial GUI disassembler/decompiler with native ObjC/Swift metadata parsing",
     when_to_use: "An affordable IDA alternative on Mac for iOS static analysis (~$99 perpetual license)",
     source: https://www.hopperapp.com/}

  # ── Access: jailbreak / permanent install / re-signing ──
  - {id: palera1n, name: palera1n, type: tool, domain: ios, bundled: false, status: active,
     capability: "checkm8 jailbreak (iOS 15–17+, rootless/rootful)",
     when_to_use: "When you need a jailbreak to run frida-server (A11 and earlier devices only)",
     source: https://github.com/palera1n/palera1n, platform: [ios]}
  - {id: trollstore, name: TrollStore, type: tool, domain: ios, bundled: false, status: active,
     capability: "Permanently install any IPA on non-jailbroken devices (CoreTrust bug), never expires",
     when_to_use: "Permanently installing a target app embedded with Frida-gadget on a non-jailbroken device (iOS ≤ 16.6.1/17.0)",
     source: https://github.com/opa334/TrollStore, platform: [ios]}
  - {id: sidestore, name: SideStore, type: tool, domain: ios, bundled: false, status: active,
     capability: "Re-signing app store with automatic re-signing, no computer required",
     when_to_use: "Persistently installing re-signed/patched IPAs on any modern iOS, without weekly re-signing",
     source: https://github.com/SideStore/SideStore, platform: [ios]}
  - {id: theos, name: theos, type: tool, domain: ios, bundled: false, status: active,
     capability: "The standard build system for iOS tweaks (Logos hooks + packaging)",
     when_to_use: "Writing Logos hook patches after reversing → build and deploy",
     source: https://github.com/theos/theos}
  - {id: ldid, name: ldid (Procursus), type: tool, domain: ios, bundled: false, status: active,
     capability: "Lightweight codesign that reads/writes Mach-O signatures + entitlements",
     when_to_use: "Re-signing after patching, adding debug entitlements like get-task-allow",
     source: https://github.com/ProcursusTeam/ldid}

  # ── Dynamic ──
  - {id: objection-ios, name: Objection (iOS), type: tool, domain: ios, bundled: false, status: active,
     capability: "iOS one-click: SSL unpin / jailbreak-detection bypass / TouchID-FaceID bypass / keychain dump",
     when_to_use: "iOS runtime exploration + one-click bypass of various checks (no jailbreak needed — can patchipa to embed the gadget)",
     source: https://github.com/sensepost/objection, platform: [ios, android]}
  - {id: grapefruit, name: Grapefruit, type: tool, domain: ios, bundled: false, status: active,
     capability: "Frida-based Web UI for iOS analysis (hook/crypto/files/memory)",
     when_to_use: "Quick dynamic reconnaissance before writing targeted Frida scripts",
     source: https://github.com/ChiChou/grapefruit, platform: [ios, android]}
  - {id: frida-ios-hook, name: frida-ios-hook, type: script, domain: ios, bundled: false, status: active,
     capability: "iOS-specific Frida wrapper: bypass-jb / bypass-ssl / dump IPA / trace",
     when_to_use: "A ready-made set of jailbreak/SSL-bypass + dump scripts on iOS",
     source: https://github.com/noobpk/frida-ios-hook, platform: [ios]}

  # ── batch-added from collection shortlist (core, bundled:false) ──
  - {id: ios-reverse-engineering-claude-skill, name: "iOS RE Claude Skill", type: skill, domain: ios, bundled: false, status: active,
     capability: "Claude skill to extract/analyze IPA/.app/Mach-O: dump ObjC/Swift headers, find URLSession/Alamofire/AFNetworking/GraphQL endpoints, secret scanning, ATS/pinning/jailbreak/anti-debug checks, radare2/rizin/Ghidra decompile.",
     when_to_use: "You have an IPA or .app/Mach-O and need to enumerate its HTTP endpoints, dump class headers, scan for embedded secrets, or audit its ATS/cert-pinning/jailbreak-detection from a Claude-driven workflow.",
     source: https://github.com/incogbyte/iOS-reverse-engineering-claude-skill, install: "git clone https://github.com/incogbyte/iOS-reverse-engineering-claude-skill"}
  - {id: flexdecrypt, name: "flexdecrypt", type: tool, domain: ios, bundled: false, status: active,
     capability: "On-device Mach-O decryptor that strips Apple FairPlay (cryptid) encryption from installed App Store binaries, producing a decrypted dump for static analysis.",
     when_to_use: "App Store IPA binary is FairPlay-encrypted (cryptid=1) and class-dump/Ghidra show garbage; run on a jailbroken device to get the decrypted Mach-O.",
     source: https://github.com/JohnCoates/flexdecrypt, install: "git clone https://github.com/JohnCoates/flexdecrypt"}
  - {id: ipatool, name: "ipatool", type: tool, domain: ios, bundled: false, status: active,
     capability: "Cross-platform Go CLI to authenticate with an Apple ID, search the App Store, and download IPA files for a target app/version.",
     when_to_use: "You need to obtain the IPA of an App Store app for analysis (no jailbroken extraction needed) by downloading it directly with your Apple ID.",
     source: https://github.com/majd/ipatool, install: "brew install ipatool"}
  - {id: class-dump, name: "class-dump", type: tool, domain: ios, bundled: false, status: active,
     capability: "Generates Objective-C class, category, and protocol declarations from the runtime metadata in a Mach-O binary.",
     when_to_use: "You have a decrypted Mach-O/iOS binary and want a readable ObjC class/method header map to find selectors, properties, and entry points before deeper RE.",
     source: https://github.com/nygard/class-dump, install: "brew install class-dump"}
  - {id: swiftdump, name: "SwiftDump", type: tool, domain: ios, bundled: false, status: active,
     capability: "Dumps Swift class/struct/enum/protocol metadata and field layouts from a Mach-O binary (the Swift counterpart to class-dump).",
     when_to_use: "Target iOS binary is Swift (class-dump yields little) and you need Swift type/method metadata to map the app's structure.",
     source: https://github.com/neil-wu/SwiftDump, install: "git clone https://github.com/neil-wu/SwiftDump"}
  - {id: optool, name: "optool", type: tool, domain: ios, bundled: false, status: active,
     capability: "CLI to insert/remove Mach-O load commands, strip code signatures, resign, and remove ASLR (PIE) flags.",
     when_to_use: "You need to patch a Mach-O to add a load command (e.g. inject a Frida/tweak dylib), strip its signature, or disable PIE/ASLR for static patching.",
     source: https://github.com/alexzielenski/optool, install: "git clone https://github.com/alexzielenski/optool"}
  - {id: insert-dylib, name: "insert_dylib", type: tool, domain: ios, bundled: false, status: active,
     capability: "CLI that adds an LC_LOAD_DYLIB load command to a Mach-O so a chosen dylib loads at launch (dylib injection).",
     when_to_use: "You want to side-load a custom/Frida/cycript dylib into an iOS app binary by injecting an LC_LOAD_DYLIB into its Mach-O header.",
     source: https://github.com/tyilo/insert_dylib, install: "git clone https://github.com/tyilo/insert_dylib"}
  - {id: r2frida, name: "r2frida", type: tool, domain: ios, bundled: false, status: active,
     capability: "Bridges radare2 static disassembly with Frida runtime memory access for live introspection, memory search, and hooking of running iOS/Android processes.",
     when_to_use: "You want to drive Frida memory reads/writes and hooks from inside a radare2 session against a live process (search runtime memory, resolve symbols, patch at runtime).",
     source: https://github.com/nowsecure/r2frida, install: "r2pm -ci r2frida"}
  - {id: keychain-dumper, name: "Keychain-Dumper", type: tool, domain: ios, bundled: false, status: active,
     capability: "Dumps all iOS keychain entries (generic/internet passwords, keys, certificates, identities) on a jailbroken device.",
     when_to_use: "You need to extract stored credentials/tokens/keys an iOS app saved in the keychain, on a jailbroken device.",
     source: https://github.com/ptoomey3/Keychain-Dumper, install: "git clone https://github.com/ptoomey3/Keychain-Dumper"}
  - {id: libimobiledevice, name: "libimobiledevice", type: tool, domain: ios, bundled: false, status: active,
     capability: "Cross-platform library plus CLIs (ideviceinstaller, idevicesyslog, ifuse, idevicebackup2) speaking native iOS lockdown/usbmux protocols without a jailbreak.",
     when_to_use: "You need to install/list apps, pull device syslog, mount the filesystem, or back up an iOS device over USB from Linux/macOS without jailbreaking.",
     source: https://github.com/libimobiledevice/libimobiledevice, install: "brew install libimobiledevice"}

  # ── batch-added from collection shortlist (core, bundled:false) ──
  - {id: bfdecrypt, name: "bfdecrypt", type: tool, domain: ios, bundled: false, status: active,
     capability: "Frida/dylib utility (BishopFox) that extracts decrypted app binaries (removes FairPlay encryption) on jailbroken iOS, producing a clean IPA.",
     when_to_use: "When you have a jailbroken iOS device and need to dump a decrypted IPA of an App Store app (FairPlay-encrypted) before static analysis in IDA/Ghidra.",
     source: https://github.com/BishopFox/bfdecrypt, install: "git clone https://github.com/BishopFox/bfdecrypt"}
  - {id: dumpdecrypted, name: "dumpdecrypted", type: tool, domain: ios, bundled: false, status: archived,
     capability: "Classic injectable dylib that dumps the decrypted Mach-O of an encrypted iPhone app from memory to disk via DYLD_INSERT_LIBRARIES.",
     when_to_use: "When decrypting a FairPlay-protected iOS app binary on a jailbroken device the old-school way (DYLD_INSERT_LIBRARIES dylib injection) and you just need the decrypted Mach-O.",
     source: https://github.com/stefanesser/dumpdecrypted, install: "git clone https://github.com/stefanesser/dumpdecrypted"}
  - {id: r2flutch, name: "r2flutch", type: tool, domain: ios, bundled: false, status: active,
     capability: "radare2 + Frida tool to decrypt and dump iOS app binaries and inspect them, integrating r2 analysis into the dump workflow.",
     when_to_use: "When you want to decrypt/dump an iOS app and immediately analyze it in radare2, combining Frida-based decryption with r2 inspection in one tool.",
     source: https://github.com/as0ler/r2flutch, install: "pip install r2flutch"}
  - {id: orion-theos, name: "Orion (theos)", type: platform, domain: ios, bundled: false, status: active,
     capability: "Swift DSL/framework for writing Objective-C method hooks and jailbreak tweaks ergonomically atop Theos, replacing Logos with type-safe Swift.",
     when_to_use: "When building an iOS jailbreak tweak or runtime hook in Swift instead of Logos/Objective-C and you want compile-time-checked method swizzling via Theos.",
     source: https://github.com/theos/orion, install: "git clone https://github.com/theos/orion"}
  - {id: theos-jailed, name: "theos-jailed", type: platform, domain: ios, bundled: false, status: archived,
     capability: "Theos module that builds jailed (no-jailbreak) tweaks by injecting your dylib into a resigned/repackaged IPA for sideloading.",
     when_to_use: "When you need to run a Theos/Logos tweak on a non-jailbroken iOS device by injecting the dylib into a resigned IPA (jailed sideload) instead of installing on a jailbroken phone.",
     source: https://github.com/kabiroberai/theos-jailed, install: "git clone https://github.com/kabiroberai/theos-jailed"}
  - {id: fishhook, name: "fishhook", type: tool, domain: ios, bundled: false, status: active,
     capability: "Facebook library to dynamically rebind (hook) C/libc symbol references in Mach-O binaries at runtime, similar to dyld interposing.",
     when_to_use: "When you need to hook a C library symbol (e.g. open, SSL_write) in an iOS/macOS Mach-O at runtime from your own injected code rather than Objective-C method swizzling.",
     source: https://github.com/facebook/fishhook, install: "git clone https://github.com/facebook/fishhook"}
  - {id: passionfruit, name: "passionfruit", type: tool, domain: ios, bundled: false, status: active,
     capability: "Frida-based iOS app analysis web dashboard (Chaitin): file/keychain browsing, class-dump, module list, runtime method hooking via a GUI.",
     when_to_use: "When you want a point-and-click web UI over Frida to explore a jailbroken iOS app's files, keychain, classes and hooks instead of writing Frida scripts by hand.",
     source: https://github.com/chaitin/passionfruit, install: "npm install -g passionfruit"}
  - {id: flex-ios, name: "FLEX", type: tool, domain: ios, bundled: false, status: active,
     capability: "In-app iOS debugging/exploration UI: inspect and modify view hierarchy, ivars, class hierarchy, SQLite/NSUserDefaults, and live network traffic at runtime.",
     when_to_use: "When you can inject into an iOS app (jailbroken or Theos tweak) and want an on-device overlay to live-inspect view hierarchy, ivars, databases and network calls.",
     source: https://github.com/FLEXTool/FLEX, install: "git clone https://github.com/FLEXTool/FLEX"}
  - {id: ios-deploy, name: "ios-deploy", type: tool, domain: ios, bundled: false, status: active,
     capability: "Command-line tool to install, launch, and debug (lldb) iOS apps on a device over USB without Xcode, scriptable for RE/test pipelines.",
     when_to_use: "When you need to sideload/launch/lldb-debug an .app or IPA on a physical iPhone from the terminal (no Xcode GUI) as part of an automated RE or testing pipeline.",
     source: https://github.com/ios-control/ios-deploy, install: "npm install -g ios-deploy"}
  - {id: swordfish-awesome-ios-security, name: "awesome-ios-security", type: platform, domain: ios, bundled: false, status: active,
     capability: "Actively maintained iOS app-security index: tools, books, courses, blog posts and Frida/jailbreak tooling.",
     when_to_use: "Need iOS-specific app-security and reversing resources (jailbreak tooling, Frida-on-iOS, IPA analysis) or learning material; iOS discovery list, not a runnable tool.",
     source: https://github.com/Swordfish-Security/awesome-ios-security}
  - {id: riskified-ios-beacon, name: "riskified-ios-beacon", type: tool, domain: ios, bundled: false, status: active,
     capability: "Official Riskified iOS mobile beacon SDK for merchants — the genuine vendor SDK that emits device/behavior beacon data for fraud scoring.",
     when_to_use: "Use as ground-truth reference when reversing or replicating Riskified beacon traffic from an iOS app: the official SDK reveals init params, beacon fields and integration points; vendor source, not a bypass.",
     source: https://github.com/Riskified/riskified-ios-beacon, install: "git clone https://github.com/Riskified/riskified-ios-beacon"}
