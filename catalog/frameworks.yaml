# Framework-specific reverse-engineering catalog (Flutter / Unity / React Native). See catalog/SCHEMA.md for the schema.
# Routing: unpack and check lib/ — libflutter.so → flutter, libil2cpp.so → unity, libhermes.so → rn.

entries:
  # ── Flutter ──
  - {id: reflutter, name: reFlutter, type: tool, domain: framework, bundled: false, status: active,
     capability: "Repacks a patched Flutter engine; dumps classes/functions + redirects traffic + bypasses certificate pinning",
     when_to_use: "When the target is Flutter (jadx fails completely) and repacking is possible (Android + iOS)",
     source: https://github.com/Impact-I/reFlutter, install: "pip install reflutter", platform: [android, ios]}
  - {id: blutter, name: blutter, type: tool, domain: framework, bundled: false, status: active,
     capability: "Static disassembly of Flutter libapp.so, reconstructs classes/functions + emits IDA/Frida scripts",
     when_to_use: "Flutter static analysis (without repacking), complementary to reFlutter",
     source: https://github.com/worawit/blutter, platform: [android]}
  # ── Unity / IL2CPP ──
  - {id: frida-il2cpp-bridge, name: frida-il2cpp-bridge, type: tool, domain: framework, bundled: false, status: active,
     capability: "Runtime dump/trace/hijack of IL2CPP (Unity) class methods without global-metadata.dat",
     when_to_use: "When the target is a Unity/IL2CPP game (libil2cpp.so) — the top-tier dynamic approach",
     source: https://github.com/vfsfitvnm/frida-il2cpp-bridge, install: "npm i frida-il2cpp-bridge", platform: [android, ios]}
  - {id: il2cppdumper, name: Il2CppDumper, type: tool, domain: framework, bundled: false, status: slowed,
     capability: "Static IL2CPP dumper, generates IDA/Ghidra/BN scripts",
     when_to_use: "Static DLL recovery for Unity (stops at Unity 2022.2; for newer versions pair frida-il2cpp-bridge)",
     source: https://github.com/Perfare/Il2CppDumper}
  # ── React Native / Hermes ──
  - {id: hermes-dec, name: hermes-dec, type: tool, domain: framework, bundled: false, status: active,
     capability: "Hermes bytecode (HBC) disassembly + decompilation back to pseudo-JS (HBC 59+)",
     when_to_use: "When RN uses Hermes (libhermes.so + index.android.bundle) — decompile the bundle",
     source: https://github.com/P1sec/hermes-dec, install: "pip install hermes-dec", platform: [android, ios]}
  - {id: hermes-decomp, name: hermes-decomp, type: tool, domain: framework, bundled: false, status: active,
     capability: "Rust Hermes decompiler, widest coverage of HBC 40–99",
     when_to_use: "For newer Hermes bundles (high HBC versions that hermes-dec doesn't support)",
     source: https://github.com/SymbioticSec/hermes-decomp}
  - {id: hermes-rs, name: hermes_rs, type: tool, domain: framework, bundled: false, status: active, alt_to: [hbctool],
     capability: "Rust Hermes disassembler + assembler (HBC 89–96 round-trip patch)",
     when_to_use: "When you need to modify Hermes bytecode and repack (a replacement for the stalled hbctool)",
     source: https://github.com/Pilfer/hermes_rs}

  # ── batch-added from collection shortlist (core, bundled:false) ──
  - {id: repoaudit, name: "RepoAudit", type: agent, domain: framework, bundled: false, status: active,
     capability: "Autonomous LLM agent for repository-level security auditing with cross-function dataflow/taint reasoning to discover vulnerabilities across an entire codebase.",
     when_to_use: "You need to audit a whole source repository for vulnerabilities with an LLM agent that reasons about cross-function dataflow/taint (not single-file review). Trigger: 'find security bugs across this repo', repo-level vuln discovery with source available.",
     source: https://github.com/PurCL/RepoAudit, install: "git clone https://github.com/PurCL/RepoAudit"}
  - {id: sekiro-2, name: "SEKIRO", type: platform, domain: framework, bundled: false, status: active,
     capability: "Distributed RPC / service-publishing platform that exposes handlers running inside a browser, app, or Frida process as a centrally-callable HTTP API (JSRPC), with multi-language client support and a request queue.",
     when_to_use: "You want to call an algorithm that only runs inside a live environment (browser JS, Android app via Frida, hooked function) over HTTP — i.e. JSRPC to generate signatures/decrypt on demand without porting the algorithm. Trigger: JSRPC, expose in-app/in-browser signing function as an API.",
     source: https://github.com/yint-tech/sekiro-open, install: "git clone https://github.com/yint-tech/sekiro-open"}

  # ── batch-added from collection shortlist (core, bundled:false) ──
  - {id: ai-vuln-harness-daedalus, name: "ai-vuln-harness", type: agent, domain: framework, bundled: false, status: active,
     capability: "Multi-agent 15-stage vuln-research pipeline (hunt, validate, dedupe, trace, PoC) following Project Glasswing / Cloudflare methodology.",
     when_to_use: "Want a staged multi-agent vuln-research harness covering hunting through PoC generation; reference for the Glasswing/Cloudflare pipeline structure.",
     source: https://github.com/daedalus/ai-vuln-harness, install: "git clone https://github.com/daedalus/ai-vuln-harness"}
  - {id: vulnllm-r-ucsb, name: "VulnLLM-R", type: agent, domain: framework, bundled: false, status: active,
     capability: "UCSB reasoning-focused LLM plus agent scaffold specialized for vulnerability detection in source code.",
     when_to_use: "Need a reasoning-tuned LLM + agent scaffold purpose-built for source-code vulnerability detection research.",
     source: https://github.com/ucsb-mlsec/VulnLLM-R, install: "git clone https://github.com/ucsb-mlsec/VulnLLM-R"}
  - {id: vulnhalla-cyberark, name: "Vulnhalla", type: tool, domain: framework, bundled: false, status: active,
     capability: "CyberArk LLM-assisted CodeQL triage agent that reviews static-analysis findings to reduce false positives and prioritize real vulns.",
     when_to_use: "Drowning in CodeQL static-analysis alerts and want an LLM triage layer to cut false positives and rank exploitable findings.",
     source: https://github.com/cyberark/Vulnhalla, install: "git clone https://github.com/cyberark/Vulnhalla"}
  - {id: fuzz4all, name: "Fuzz4All", type: tool, domain: framework, bundled: false, status: active,
     capability: "Universal LLM-driven fuzzer (ICSE) using autoprompting + an LLM fuzz loop to generate diverse inputs across many target languages/compilers/SMT solvers.",
     when_to_use: "Fuzzing language tooling (compilers, interpreters, SMT/SAT solvers) and want LLM-generated diverse inputs instead of grammar-based mutation.",
     source: https://github.com/fuzz4all/fuzz4all, install: "git clone https://github.com/fuzz4all/fuzz4all && pip install -r requirements.txt"}
  - {id: nyuctf-agents-dcipher, name: "PentAGI / D-CIPHER (NYU CTF agents)", type: agent, domain: framework, bundled: false, status: active,
     capability: "NYU multi-agent CTF/0-day coordination agents (D-CIPHER) plus the NYU CTF benchmark for evaluating LLM offensive-security capability.",
     when_to_use: "Running or benchmarking coordinated multi-agent CTF solving against the NYU CTF dataset; study D-CIPHER agent coordination for offensive tasks.",
     source: https://github.com/NYU-LLM-CTF/nyuctf_agents, install: "git clone https://github.com/NYU-LLM-CTF/nyuctf_agents && pip install -r requirements.txt"}
  - {id: hackerai, name: "HackerAI", type: agent, domain: framework, bundled: false, status: active,
     capability: "Open-source AI-driven offensive-security assistant/framework that drives pentest workflows (recon, enumeration, exploitation suggestions) via an LLM agent loop.",
     when_to_use: "Reach for an autonomous AI pentest co-pilot to plan/execute offensive-security workflows end-to-end rather than a single point tool; authorized engagements/CTF where you want an LLM agent orchestrating recon and exploitation.",
     source: https://github.com/hackerai-tech/hackerai, install: "git clone https://github.com/hackerai-tech/hackerai"}
  - {id: cyber-autoagent-ng, name: "Cyber-AutoAgent (ng)", type: agent, domain: framework, bundled: false, status: active,
     capability: "Autonomous cyber agent for end-to-end offensive tasks, reporting strong XBOW-benchmark scores; runs unattended attack/triage loops against a target scope.",
     when_to_use: "Want a fully autonomous offensive agent benchmarked on XBOW-style web-exploitation tasks to chew through a target with minimal supervision; comparison baseline for autonomous-pentest agents.",
     source: https://github.com/double16/cyber-autoagent-ng, install: "git clone https://github.com/double16/cyber-autoagent-ng"}
  - {id: sekiro-samples, name: "sekiro-samples", type: script, domain: framework, bundled: false, status: active,
     capability: "Official Sekiro RPC sample handlers (JS/Java/Android) showing how to register and invoke remote browser/device functions over the Sekiro long-connection framework.",
     when_to_use: "Wiring up Sekiro JSRPC to call in-page JS encryption from your backend; need working handler templates for client registration and request/response routing.",
     source: https://github.com/yint-tech/sekiro-samples, install: "git clone https://github.com/yint-tech/sekiro-samples"}
